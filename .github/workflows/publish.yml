name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish_pure_python.yml@v2.6.5
    with:
      # Build the sdist and wheel and save them as artifacts, but let the
      # separate job below do the upload so that we can use trusted publishing.
      upload_to_pypi: false
      save_artifacts: true
      test_extras: test
      test_command: pytest --pyargs batchpr

  publish:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    name: Upload to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/batchpr
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          pattern: dist-*
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
